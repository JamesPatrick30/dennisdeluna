<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>S.A.N.G · Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="top-nav">
        <a href="index.html" class="logo">
            <div class="logo-icon"><i class="fas fa-gamepad"></i></div>
            <div><h1>S.A.N.G</h1><p>Sali Ako Next G</p></div>
        </a>
        <div class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="explore.html"><i class="fas fa-compass"></i><span>Explore</span></a>
            <a href="rankings.html"><i class="fas fa-trophy"></i><span>Rankings</span></a>
            <a href="messages.html"><i class="fas fa-envelope"></i><span>Messages</span></a>
            <a href="notifications.html"><i class="fas fa-bell"></i><span>Notifications</span></a>
        </div>
        <a href="profile.html" class="user-menu">
            <div class="user-avatar-small"><img src="images/dennis.jpg" alt="Waduhek"></div>
            <span>Waduhek Gaming</span>
            <i class="fas fa-chevron-down" style="font-size: 10px;"></i>
        </a>
    </div>

    <div class="main-grid">
        <div class="left-panel">
            <a href="profile.html" class="profile-card">
                <div class="profile-avatar"><img src="images/dennis.jpg" alt="Waduhek"></div>
                <h3>Waduhek Gaming</h3>
                <p>@waduhekgaming</p>
                <p style="font-size: 10px; margin-top: 6px;">Gamer</p>
            </a>
            <a href="profile.html" class="menu-item"><i class="fas fa-user"></i> My Profile</a>
            <a href="messages.html" class="menu-item"><i class="fas fa-comment-dots"></i> Messages</a>
            <a href="rankings.html" class="menu-item"><i class="fas fa-trophy"></i> Rankings</a>
            <a href="settings.html" class="menu-item"><i class="fas fa-cog"></i> Settings</a>
        </div>

        <div class="feed-panel" id="profileContent">
           
        </div>

        <div class="right-panel">
            <div class="section-title">Notifications</div>
            <a href="notifications.html" class="notification-item"><i class="fas fa-heart" style="color: var(--danger);"></i><span><strong>Lebron</strong> liked your post</span></a>
            
            <div class="section-title">Top Rankings</div>
            
            <!-- Rank 1 - Lebron (blue badge) -->
            <a href="profile.html?user=lebron" class="rank-item" style="display:flex; align-items:center; gap:12px; text-decoration:none;">
                <div style="width:40px; height:40px; border-radius:50%; overflow:hidden;">
                    <img src="images/lebron.jpg" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div style="flex:1;">
                    <div style="font-weight:600;">Lebron Gaming</div>
                    <div style="font-size:11px; color:var(--text-secondary);">9,850 MMR</div>
                </div>
                <div style="background:var(--accent); padding:4px 10px; border-radius:20px; font-size:11px;">1st</div>
            </a>

            <!-- Rank 2 - Stephen (blue badge) -->
            <a href="profile.html?user=stephen" class="rank-item" style="display:flex; align-items:center; gap:12px; text-decoration:none;">
                <div style="width:40px; height:40px; border-radius:50%; overflow:hidden;">
                    <img src="images/stephen.jpg" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div style="flex:1;">
                    <div style="font-weight:600;">Stephen Gaming</div>
                    <div style="font-size:11px; color:var(--text-secondary);">9,720 MMR</div>
                </div>
                <div style="background:var(--accent); padding:4px 10px; border-radius:20px; font-size:11px;">2nd</div>
            </a>

            <!-- Rank 3 - Luka (blue badge) -->
            <a href="profile.html?user=luka" class="rank-item" style="display:flex; align-items:center; gap:12px; text-decoration:none;">
                <div style="width:40px; height:40px; border-radius:50%; overflow:hidden;">
                    <img src="images/luka.jpg" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div style="flex:1;">
                    <div style="font-weight:600;">Luka Gaming</div>
                    <div style="font-size:11px; color:var(--text-secondary);">9,580 MMR</div>
                </div>
                <div style="background:var(--accent); padding:4px 10px; border-radius:20px; font-size:11px;">3rd</div>
            </a>
        </div>
    </div>
</div>

<script>
   
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user');

    // Data ng bawat profile
    const profiles = {
        waduhek: {
            name: "Waduhek Gaming",
            tag: "@waduhekgaming",
            avatar: "images/dennis.jpg",
            location: "Pampanga, PH",
            posts: "1.2K",
            followers: "15.2K",
            following: "890",
            achievements: "MLBB: Mythical Immortal • Valorant: Gold 1",
            stats: "KD: 2.4 • Win Rate: 68% • Total Games: 3,421",
            activity: "Rank Push +500 pts • Liked Lebron's post • Uploaded clip",
            isOwnProfile: true
        },
        lebron: {
            name: "Lebron Gaming",
            tag: "@lebrongaming",
            avatar: "images/lebron.jpg",
            location: "USA",
            posts: "1.2K",
            followers: "20.6K",
            following: "780",
            achievements: "MLBB: Mythical Glory • Valorant: Immortal",
            stats: "KD: 2.8 • Win Rate: 72% • Total Games: 2,845",
            activity: "Posted new clip • Liked Waduhek's post • Rank push",
            isOwnProfile: false
        },
        stephen: {
            name: "Stephen Gaming",
            tag: "@stephengaming",
            avatar: "images/stephen.jpg",
            location: "USA",
            posts: "890",
            followers: "19.5K",
            following: "520",
            achievements: "MLBB: Mythical Honor • Valorant: Radiant",
            stats: "KD: 2.5 • Win Rate: 68% • Total Games: 2,120",
            activity: "Commented on post • Shared a clip",
            isOwnProfile: false
        },
        luka: {
            name: "Luka Gaming",
            tag: "@lukagaming",
            avatar: "images/luka.jpg",
            location: "Slovenia",
            posts: "734",
            followers: "18.2K",
            following: "430",
            achievements: "H.O.K: Grandmaster",
            stats: "KD: 2.2 • Win Rate: 65% • Total Games: 1,890",
            activity: "Like Lebron's post",
            isOwnProfile: false
        }
    };

   
    let profile;
    if (userId === 'lebron') {
        profile = profiles.lebron;
    } else if (userId === 'stephen') {
        profile = profiles.stephen;
    } else if (userId === 'luka') {
        profile = profiles.luka;
    } else {
        profile = profiles.waduhek;
    }

    // I-render ang profile
    const container = document.getElementById('profileContent');
    container.innerHTML = `
        <div class="card" style="text-align:center">
            <div class="profile-avatar" style="margin:0 auto 16px; width:100px; height:100px;"><img src="${profile.avatar}" alt="${profile.name}"></div>
            <h2>${profile.name}</h2>
            <p>${profile.tag} · Gamer</p>
            <div style="margin:16px 0"><i class="fas fa-map-marker-alt"></i> ${profile.location}</div>
            <div style="display:flex; gap:24px; justify-content:center; margin:16px 0">
                <div><strong>${profile.posts}</strong><br>Posts</div>
                <div><strong>${profile.followers}</strong><br>Followers</div>
                <div><strong>${profile.following}</strong><br>Following</div>
            </div>
            ${profile.isOwnProfile ? '<button class="btn btn-primary" onclick="alert(\'Edit Profile\')"><i class="fas fa-pen"></i> Edit Profile</button>' : '<button class="btn btn-primary" onclick="alert(\'Follow ' + profile.name + '\')"><i class="fas fa-user-plus"></i> Follow</button>'}
        </div>
        <div class="card"><h3>Gaming Achievements</h3><p>${profile.achievements}</p></div>
        <div class="card"><h3>Stats</h3><p>${profile.stats}</p></div>
        <div class="card"><h3>Recent Activity</h3><p>${profile.activity}</p></div>
    `;

    
    if (profile.isOwnProfile) {
        document.querySelectorAll('.menu-item')[0].classList.add('active-menu');
    } else {
        document.querySelectorAll('.menu-item')[0].classList.remove('active-menu');
    }
</script>

</body>
</html>
